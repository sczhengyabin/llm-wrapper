version: '3.8'

services:
  llm-wrapper:
    image: llm-wrapper:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "8317:8317"  # auth2api (如使用独立部署模式)
    volumes:
      - ./config:/app/config
      - ./auth2api:/app/auth2api  # auth2api 项目目录
      - llm-wrapper-data:/app/.llm-wrapper  # token 缓存
    environment:
      - BIND_ADDR=0.0.0.0:3000
      - CONFIG_PATH=/app/config/config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  llm-wrapper-data:
