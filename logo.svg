<svg width="400" height="400" viewBox="0 0 400 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>llm-wrapper logo</title>
  <desc>Round square logo: dark background with a stylized W made of converging lines representing LLM aggregation</desc>

  <rect x="0" y="0" width="400" height="400" rx="88" fill="#0f1117"/>

  <line x1="90" y1="110" x2="150" y2="270" stroke="#ffffff" stroke-width="28" stroke-linecap="round"/>
  <line x1="150" y1="270" x2="200" y2="170" stroke="#ffffff" stroke-width="28" stroke-linecap="round"/>
  <line x1="200" y1="170" x2="250" y2="270" stroke="#ffffff" stroke-width="28" stroke-linecap="round"/>
  <line x1="250" y1="270" x2="310" y2="110" stroke="#ffffff" stroke-width="28" stroke-linecap="round"/>

  <circle cx="90" cy="110" r="16" fill="#4f8ef7"/>
  <circle cx="310" cy="110" r="16" fill="#e06b4f"/>
  <circle cx="200" cy="170" r="16" fill="#6bbf8e"/>
</svg>
